name: Update polls.csv

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download fresh polling data
        run: |
          TODAY=$(date +%Y-%m-%d)
          curl -f -o polls_new.csv \
            "https://www.pollofpolls.no/lastned.csv?tabell=gallupsnitttabell&antall=10&type=riks&int=m&kommuneid=0&start=2000-01-01&slutt=${TODAY}"

      - name: Replace polls.csv if download succeeded
        run: mv polls_new.csv data/processed/polls.csv

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/polls.csv
          git diff --cached --quiet || git commit -m "Update polls.csv $(date +%Y-%m-%d)"
          git push
